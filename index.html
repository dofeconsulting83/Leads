<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plateforme Leads – ATM / MurHumide</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-background-tertiary: #eeede8;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #6b6b67;
        --color-text-tertiary: #9c9a94;
        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.18);
        --color-border-primary: rgba(0,0,0,0.28);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a18; color: #e8e8e4; }
        :root {
          --color-background-primary: #242422;
          --color-background-secondary: #2c2c2a;
          --color-background-tertiary: #1a1a18;
          --color-text-primary: #e8e8e4;
          --color-text-secondary: #9c9a94;
          --color-text-tertiary: #6b6b67;
          --color-border-tertiary: rgba(255,255,255,0.08);
          --color-border-secondary: rgba(255,255,255,0.14);
          --color-border-primary: rgba(255,255,255,0.22);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
